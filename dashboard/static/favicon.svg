<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#56d364"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  <!-- Left nodes (LLM sources) -->
  <circle cx="16" cy="20" r="5" fill="url(#blue)"/>
  <circle cx="16" cy="32" r="5" fill="url(#blue)"/>
  <circle cx="16" cy="44" r="5" fill="url(#blue)"/>
  <!-- Right nodes (API targets) -->
  <circle cx="48" cy="26" r="5" fill="url(#green)"/>
  <circle cx="48" cy="38" r="5" fill="url(#green)"/>
  <!-- Proxy connection lines -->
  <line x1="21" y1="20" x2="43" y2="26" stroke="#58a6ff" stroke-width="1.8" opacity="0.6"/>
  <line x1="21" y1="32" x2="43" y2="26" stroke="#58a6ff" stroke-width="1.8" opacity="0.6"/>
  <line x1="21" y1="32" x2="43" y2="38" stroke="#58a6ff" stroke-width="1.8" opacity="0.6"/>
  <line x1="21" y1="44" x2="43" y2="38" stroke="#58a6ff" stroke-width="1.8" opacity="0.6"/>
  <!-- Center diamond (the proxy) -->
  <polygon points="32,24 38,32 32,40 26,32" fill="#1f6feb" opacity="0.9"/>
  <polygon points="32,26 36,32 32,38 28,32" fill="#58a6ff" opacity="0.5"/>
</svg>
