services:
  # ── Elasticsearch ─────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 12
    restart: unless-stopped

  # ── mitmproxy with traffic capture addon ──────────────────────────────
  proxy:
    build:
      context: .
      target: proxy
    ports:
      - "8080:8080"                       # proxy listener
    environment:
      LLMPROXY_ES_URL: "http://elasticsearch:9200"
      LLMPROXY_MAX_BODY: "524288"         # 512 KB
      LLMPROXY_CAPTURE_BODY: "1"
      LLMPROXY_FLUSH_SIZE: "100"
      LLMPROXY_FLUSH_INTERVAL: "1.0"
      LLMPROXY_ADMIN_TOKEN: "${LLMPROXY_ADMIN_TOKEN:-}"
      LLMPROXY_AUTH_REQUIRED: "${LLMPROXY_AUTH_REQUIRED:-1}"
    volumes:
      - mitmproxy-certs:/root/.mitmproxy    # persist CA cert across rebuilds
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ── MCP server (SSE transport for Docker) ─────────────────────────────
  mcp:
    build:
      context: .
      target: mcp
    command: ["python", "mcp_server.py", "--transport", "streamable-http"]
    ports:
      - "8001:8000"                       # MCP SSE endpoint
    environment:
      LLMPROXY_ES_URL: "http://elasticsearch:9200"
      LLMPROXY_ADMIN_TOKEN: "${LLMPROXY_ADMIN_TOKEN:-}"
      LLMPROXY_AUTH_REQUIRED: "${LLMPROXY_AUTH_REQUIRED:-1}"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  es-data:
  mitmproxy-certs:
